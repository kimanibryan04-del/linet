<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Linet ❤️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; overflow: hidden; }

        /* New Romantic Background */
        .bg-love {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            overflow: hidden;
        }

        /* Animated Floating Hearts */
        .heart {
            position: absolute;
            bottom: -100px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            user-select: none;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2.5rem;
            color: white;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 650px;
            z-index: 10;
        }

        .poem-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 5px rgba(255, 77, 109, 0.3);
        }

        .btn-love {
            background: #ff4d6d;
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-love:hover {
            background: #ff758f;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.4);
        }

        #videoPlayer {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            margin-top: 20px;
            border: 3px solid white;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="bgMusic" src="Ed_Sheeran_-_Perfect(128k).mp3"></audio>

    <div class="bg-love" id="heartContainer"></div>

    <div class="container h-100 d-flex justify-content-center align-items-center">
        <div id="poemStep" class="glass-card p-5 text-center shadow-lg">
            <h2 class="mb-4 fw-bold">A Little Late, But Never Forgotten...</h2>
            <p class="poem-text mb-4">
                The 14th has passed and the roses may fade,<br>
                But my love for you is the best thing I've made.<br>
                A date on a calendar can't hold what is true,<br>
                Because every single day is Valentine's with you.
            </p>
            <button class="btn btn-love btn-lg rounded-pill px-5" onclick="goToQuestion()">Read More ✨</button>
        </div>

        <div id="questionStep" class="glass-card p-5 text-center shadow-lg hidden">
            <img src="Momanyi.webp" width="150" class="mb-4 rounded-circle">
            <h1 class="display-5 fw-bold mb-5">Will you be my Valentine?</h1>
            <div class="d-flex flex-wrap justify-content-center gap-3">
                <button class="btn btn-success btn-lg rounded-pill px-5" onclick="celebrate('music')">Yes! 🎵</button>
                <button class="btn btn-success btn-lg rounded-pill px-5" onclick="celebrate('video')">OF COURSE! 🎬</button>
            </div>
        </div>

        <div id="celebrationStep" class="glass-card p-5 text-center shadow-lg hidden">
            <h1 class="display-4 fw-bold mb-3">Yay! 🥰</h1>
            <p id="celebrationMsg" class="fs-3"></p>

            <video id="videoPlayer" controls class="hidden">
                <source src="E&L.mp4" type="video/mp4">
            </video>

            <img id="celebrationGif" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZTBibGx2MWxpNGgya2Z6NmhucmlkcHV6OXR1Mml4eDFrNWliZGwzeSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/SYCNMcX7puxtsaV1mJ/giphy.gif" width="200" class="mt-3">
        </div>
    </div>

    <script>
        // Create random floating hearts
        function createHeart() {
            const container = document.getElementById('heartContainer');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            container.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 10000);
        }

        setInterval(createHeart, 300);

        function goToQuestion() {
            document.getElementById('poemStep').classList.add('hidden');
            document.getElementById('questionStep').classList.remove('hidden');
        }

        function celebrate(choice) {
            document.getElementById('questionStep').classList.add('hidden');
            document.getElementById('celebrationStep').classList.remove('hidden');

            if (choice === 'music') {
                const music = document.getElementById('bgMusic');
                music.play().catch(e => console.log("Playback interaction required"));
                document.getElementById('celebrationMsg').innerText = "For You... ❤️";
            }
            else if (choice === 'video') {
                const video = document.getElementById('videoPlayer');
                document.getElementById('celebrationGif').classList.add('hidden');
                video.classList.remove('hidden');
                video.play();
                document.getElementById('celebrationMsg').innerText = "I love you so much! 😍";
            }
        }
    </script>
</body>
</html>
